version: 2

models:
  - name: time_spine_daily
    description: "Daily time spine for MetricFlow"
    config:
      materialized: table
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: "The date"
        granularity: day

  - name: stg_customers
    semantic_model:
      enabled: true
      name: stg_customers
    columns:
      - name: customer_id
        entity:
          type: primary
          name: customer
      - name: first_name
        dimension:
          type: categorical
      - name: last_name
        dimension:
          type: categorical
  - name: stg_products
    semantic_model:
      enabled: true
      name: stg_products
    columns:
      - name: product_id
        entity:
          type: primary
          name: product
      - name: product_name
        dimension:
          type: categorical
      - name: price
        dimension:
          type: categorical
  - name: fct_orders
    semantic_model:
      enabled: true
      name: fct_orders
    agg_time_dimension: order_date
    columns:
      - name: order_id
        entity:
          type: primary
      - name: customer_id
        entity:
          type: foreign
          name: customer
      - name: product_id
        entity:
          type: foreign
          name: product
      - name: order_date
        dimension:
          type: time
        granularity: day
    metrics:
      - name: total_revenue
        label: Total Revenue
        description: "Sum of all order values"
        type: simple
        agg: sum
        expr: order_amount
      - name: order_volume
        label: Order Volume
        description: "Total count of orders"
        type: simple
        agg: sum
        expr: 1
      - name: total_quantity
        description: "The total number of product units ordered"
        expr: quantity
        agg: sum
        type: simple
        hidden: true
      - name: average_order_value
        label: Average Order Value
        description: "Average revenue per order"
        type: ratio
        numerator: total_revenue
        denominator: order_volume