# Reference this view as omni_dbt__stg_customers
label: Customers Semantic
schema_label: ""

schema: omni_dbt
table_name: STG_CUSTOMERS

dimensions:
  customer_id:
    sql: '"CUSTOMER_ID"'
    format: ID
    primary_key: true

  first_name:
    sql: '"FIRST_NAME"'

  last_name:
    sql: '"LAST_NAME"'

  email:
    sql: '"EMAIL"'

  city:
    sql: '"CITY"'

  state:
    sql: '"STATE"'

  signup_date:
    sql: '"SIGNUP_DATE"'

  _entity_customer:
    # Entity is defined in the 'customers_semantic' dbt semantic model (models/semantic_models.yml)
    sql: ${omni_dbt__stg_customers.customer_id}
    hidden: true

measures:
  count:
    aggregate_type: count

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: stg_customers
  target_schema: dbt_akumar
  config:
    materialized: view
  code: |-
    with source as (
        select * from {{ source('ecommerce', 'customers') }}
    )
    select * from source
  referenced_by: [ fct_orders ]
