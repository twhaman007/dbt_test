# Reference this view as savings_momentum_qv
# Omni Query View: savings_momentum_qv
# Generated from Tableau calculation: Savings Momentum
# Source table: ri_csp_clean_csv
# Auto-generated query view for Tableau TABLE_CALC_RUNNING. Original: RUNNING_SUM(SUM([purchaseExpectedSaving]))
# Tableau LOD not expressible as Omni level_of_detail: generated as query view fallback
schema: PUBLIC
sql: |
  SELECT
    purchase_account_id AS grouping_dim,
    SUM(SUM(purchaseExpectedSaving)) OVER (ORDER BY purchase_account_id ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS savings_momentum
  FROM ri_csp_clean_csv
  GROUP BY purchase_account_id

dimensions:
  savings_momentum: {}

  grouping_dim:
    primary_key: true

measures:
  count:
    aggregate_type: count
