# Reference this view as ecommerce_db_public__products
catalog: ECOMMERCE_DB
schema: PUBLIC
table_name: PRODUCTS

dimensions:
  product_id:
    sql: '"PRODUCT_ID"'
    format: ID

  product_name:
    sql: '"PRODUCT_NAME"'

  category:
    sql: '"CATEGORY"'



measures:
  count:
    aggregate_type: count
