# Reference this view as ecommerce_db_dbt_akumar__fct_orders
label: Fct Orders Semantic

catalog: ECOMMERCE_DB
schema: DBT_AKUMAR
table_name: FCT_ORDERS

dimensions:
  order_id:
    sql: '"ORDER_ID"'
    format: ID
    primary_key: true

  customer_id:
    sql: '"CUSTOMER_ID"'
    format: ID

  first_name:
    sql: '"FIRST_NAME"'

  last_name:
    sql: '"LAST_NAME"'

  product_id:
    sql: '"PRODUCT_ID"'
    format: ID

  product_name:
    sql: '"PRODUCT_NAME"'

  price:
    sql: '"PRICE"'

  quantity:
    sql: '"QUANTITY"'

  order_amount:
    sql: '"ORDER_AMOUNT"'

  order_date:
    sql: '"ORDER_DATE"'

  _entity_order_id:
    # Entity is defined in the 'fct_orders_semantic' dbt semantic model (models/semantic_models.yml)
    sql: ${order_id}
    hidden: true

  _entity_customer:
    # Entity is defined in the 'fct_orders_semantic' dbt semantic model (models/semantic_models.yml)
    sql: ${customer_id}
    hidden: true

  _entity_product:
    # Entity is defined in the 'fct_orders_semantic' dbt semantic model (models/semantic_models.yml)
    sql: ${product_id}
    hidden: true

measures:
  count:
    aggregate_type: count

  total_order_amount:
    # Measure is defined in the 'fct_orders_semantic' dbt semantic model (models/semantic_models.yml)
    sql: ${order_amount}
    description: The total value of orders
    aggregate_type: sum

  total_quantity:
    # Measure is defined in the 'fct_orders_semantic' dbt semantic model (models/semantic_models.yml)
    sql: ${quantity}
    description: The total number of product units ordered
    aggregate_type: sum

  order_count:
    # Measure is defined in the 'fct_orders_semantic' dbt semantic model (models/semantic_models.yml)
    sql: "1"
    description: The total count of orders placed
    aggregate_type: sum

  average_order_value:
    # Measure is defined by the 'average_order_value' dbt metric (models/semantic_models.yml)
    sql: CAST(${total_revenue} AS DOUBLE) / NULLIF(CAST(${order_volume} AS DOUBLE),
      0)
    label: Average Order Value
    description: Average revenue per order

  total_revenue:
    # Measure is defined by the 'total_revenue' dbt metric (models/semantic_models.yml)
    sql: ${order_amount}
    label: Total Revenue
    description: Sum of all order values
    aggregate_type: sum

  order_volume:
    # Measure is defined by the 'order_volume' dbt metric (models/semantic_models.yml)
    sql: "1"
    label: Order Volume
    description: Total count of orders
    aggregate_type: sum

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: fct_orders
  target_schema: dbt_akumar
  config:
    materialized: table
  code: |-
    with orders as (
        select * from {{ ref('stg_orders') }}
    ),
    customers as (
        select * from {{ ref('stg_customers') }}
    ),
    products as (
        select * from {{ ref('stg_products') }}
    )
    select
        o.order_id,
        o.customer_id,
        c.first_name,
        c.last_name,
        o.product_id,
        p.product_name,
        p.price,
        o.quantity,
        (o.quantity * p.price) as order_amount,
        o.order_date
    from orders o
    left join customers c on o.customer_id = c.customer_id
    left join products p on o.product_id = p.product_id
