# Reference this view as ecommerce_db_public__stg_customers
catalog: ECOMMERCE_DB
schema: PUBLIC
table_name: STG_CUSTOMERS

dimensions:
  customer_id:
    sql: '"CUSTOMER_ID"'
    format: ID

  first_name:
    sql: '"FIRST_NAME"'

  last_name:
    sql: '"LAST_NAME"'

  email:
    sql: '"EMAIL"'

  city:
    sql: '"CITY"'

  state:
    sql: '"STATE"'

  signup_date:
    sql: '"SIGNUP_DATE"'

measures:
  count:
    aggregate_type: count
