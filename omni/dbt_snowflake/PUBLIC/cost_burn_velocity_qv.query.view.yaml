schema: PUBLIC
sql: |
  SELECT
    key AS grouping_dim,
    AVG(SUM(annualCost)) OVER (PARTITION BY key ROWS BETWEEN 3 PRECEDING AND CURRENT ROW) AS cost_burn_velocity
  FROM ri_csp_clean_csv

