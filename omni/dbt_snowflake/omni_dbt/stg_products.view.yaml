# Reference this view as omni_dbt__stg_products
label: Products Semantic
schema_label: ""

schema: omni_dbt
table_name: STG_PRODUCTS

dimensions:
  product_id:
    sql: '"PRODUCT_ID"'
    format: ID
    primary_key: true

  product_name:
    sql: '"PRODUCT_NAME"'

  category:
    sql: '"CATEGORY"'

  price:
    sql: '"PRICE"'

  stock_quantity:
    sql: '"STOCK_QUANTITY"'

  _entity_product:
    # Entity is defined in the 'products_semantic' dbt semantic model (models/semantic_models.yml)
    sql: ${omni_dbt__stg_products.product_id}
    hidden: true

measures:
  count:
    aggregate_type: count

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: stg_products
  target_schema: dbt_akumar
  config:
    materialized: view
  code: |-
    with source as (
        select * from {{ source('ecommerce', 'products') }}
    )
    select * from source
  referenced_by: [ fct_orders ]
