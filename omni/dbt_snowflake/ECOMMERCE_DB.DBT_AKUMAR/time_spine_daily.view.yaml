# Reference this view as ecommerce_db_dbt_akumar__time_spine_daily
#This description was pulled from dbt.
description: Daily time spine for MetricFlow

catalog: ECOMMERCE_DB
schema: DBT_AKUMAR
table_name: TIME_SPINE_DAILY

dimensions:
  date_day:
    sql: '"DATE_DAY"'
    #This description was pulled from dbt.
    description: The date

measures:
  count:
    aggregate_type: count

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: time_spine_daily
  target_schema: dbt_akumar
  description: Daily time spine for MetricFlow
  config:
    materialized: table
  code: |-
    {{ config(materialized='table') }}

    with days as (
        {{ dbt.date_spine(
            datepart="day",
            start_date="cast('2020-01-01' as date)",
            end_date="cast('2030-01-01' as date)"
        ) }}
    ),
    final as (
        select cast(date_day as date) as date_day from days
    )
    select * from final
