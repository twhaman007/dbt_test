# Reference this view as ecommerce_db_public__stg_products
catalog: ECOMMERCE_DB
schema: PUBLIC
table_name: STG_PRODUCTS

dimensions:
  product_id:
    sql: '"PRODUCT_ID"'
    format: ID

  product_name:
    sql: '"PRODUCT_NAME"'

  category:
    sql: '"CATEGORY"'

  price:
    sql: '"PRICE"'

  stock_quantity:
    sql: '"STOCK_QUANTITY"'

measures:
  count:
    aggregate_type: count
